services:

  postgres:
    image: postgres:16-alpine
    container_name: rent-wrangler-postgres
    environment:
      POSTGRES_DB: rentwrangler
      POSTGRES_USER: rentwrangler
      POSTGRES_PASSWORD: rentwrangler_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentwrangler -d rentwrangler"]
      interval: 10s
      timeout: 5s
      retries: 5

  wiremock:
    image: wiremock/wiremock:3.5.4
    container_name: rent-wrangler-wiremock
    ports:
      - "9090:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: --verbose
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rent-wrangler-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rentwrangler
      SPRING_DATASOURCE_USERNAME: rentwrangler
      SPRING_DATASOURCE_PASSWORD: rentwrangler_secret
      APP_ADDRESS_VALIDATION_BASE_URL: http://wiremock:8080
      # AES-256 key (32 bytes base64-encoded) — rotate this in production via secrets manager
      APP_ENCRYPTION_KEY: "dGhpcy1pcy1hLTMyLWJ5dGUta2V5LWZvci1hZXMtMjU2"
    depends_on:
      postgres:
        condition: service_healthy
      wiremock:
        condition: service_healthy

volumes:
  postgres_data:
